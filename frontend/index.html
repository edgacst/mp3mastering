<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MP3 마스터링</title>
  <link rel="stylesheet" href="/style/main.css" />
</head>
<body>
  <header class="glass">
    <h1>venysound mp3 마스터링 스튜디오</h1>
  </header>
  <main id="app" class="container glass"></main>
  <section class="guide-panel glass" aria-label="사용법 안내">
    <h2>사용법 안내</h2>
    <ol>
      <li>업로드 박스를 클릭하거나 파일을 드래그해서 MP3를 선택하세요. 여러 곡도 한 번에 가능합니다.</li>
      <li>업로드가 끝나면 곡 목록을 확인하고 마스터링 시작 버튼을 누르세요.</li>
      <li>진행률과 경과 시간을 확인한 뒤, 완료되면 곡별 다운로드 링크를 눌러 저장하세요.</li>
      <li>파일명은 원본 제목을 유지하며, 서버 처리 후 자동으로 내려받을 수 있습니다.</li>
    </ol>
  </section>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
